name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: make build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: spring-boot-demo-jar
          path: target/*.jar
          retention-days: 7

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-demo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-demo:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [test, build, docker]
    if: always()
    steps:
      - name: Aggregate job statuses
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test job failed: ${{ needs.test.result }}"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "build job failed: ${{ needs.build.result }}"
            exit 1
          fi
          if [ "${{ needs.docker.result }}" != "success" ] && [ "${{ needs.docker.result }}" != "skipped" ]; then
            echo "docker job failed: ${{ needs.docker.result }}"
            exit 1
          fi
          echo "All required jobs passed."
