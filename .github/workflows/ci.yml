name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:
  workflow_dispatch:
  schedule:
    # Weekly CVE re-scan against released artefact (Mondays 06:00 UTC).
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # `changes` detects whether the push/PR touches code/build/CI files.
  # Heavy jobs are gated on `outputs.code == 'true'`; doc-only diffs
  # short-circuit to a green `ci-pass`. This avoids the Repository-
  # Rulesets deadlock that `paths-ignore` triggers (no workflow run →
  # required `ci-pass` never reports → merge blocked).
  # ---------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # On a tag push, force code=true so the publish path runs even when the
      # tagged SHA is already on main (paths-filter would otherwise compute an
      # empty diff → code=false → docker job skips → silent no-op release).
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|img/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'

  # ---------------------------------------------------------------------
  # Composite quality gate: format-check, lint (compile-warning gate),
  # hadolint, actionlint, mermaid-lint, Trivy filesystem scan, gitleaks.
  # First job in the graph — fail fast on cheap checks before spinning
  # up Maven for build/test/integration-test.
  # ---------------------------------------------------------------------
  static-check:
    needs: [changes]
    if: |
      !failure() && !cancelled() &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Static check
        run: make static-check

  test:
    needs: [changes, static-check]
    if: |
      !failure() && !cancelled() &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: |
      !failure() && !cancelled() &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Integration test
        run: make integration-test

      - name: Upload Failsafe reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: failsafe-reports
          path: target/failsafe-reports/
          retention-days: 14

  build:
    needs: [changes, static-check]
    if: |
      !failure() && !cancelled() &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: spring-boot-demo-jar
          path: target/*.jar
          retention-days: 7

  # ---------------------------------------------------------------------
  # End-to-end smoke test against the packaged JAR. Boots on a kernel-
  # allocated free port (`server.port=0`), runs CRUD + health + swagger
  # + commit-info assertions, tears down. Catches regressions in the
  # built artefact that integration tests (in-process) cannot — bad
  # main-class, missing dependencies in BOOT-INF, broken layered jar.
  # ---------------------------------------------------------------------
  e2e:
    needs: [changes, build]
    if: |
      !failure() && !cancelled() &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: E2E
        run: make e2e

      - name: Upload e2e log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: e2e-smoke-log
          path: target/e2e-smoke.log
          retention-days: 14

  # ---------------------------------------------------------------------
  # OWASP dependency-check. Runs on tag pushes, weekly schedule, and
  # manual dispatch — too slow for every push (NVD download dominates).
  # The NVD database is independent of project deps, so it is cached keyed
  # on the ISO week (not pom.xml — a pom bump would needlessly evict the DB
  # → cold ~30-min refetch that then throttles under anonymous limits).
  # Two vuln sources run: NVD (NVD_API_KEY) and Sonatype OSS Index
  # (OSS_INDEX_USER + OSS_INDEX_TOKEN — OSS Index is silently disabled
  # without them; see the Makefile cve-check recipe).
  # ---------------------------------------------------------------------
  cve-check:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Compute NVD cache week
        id: nvdweek
        run: echo "week=$(date -u +%Y-%V)" >> "$GITHUB_OUTPUT"

      - name: Cache NVD database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ steps.nvdweek.outputs.week }}
          restore-keys: nvd-

      - name: CVE check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OSS_INDEX_USER: ${{ secrets.OSS_INDEX_USER }}
          OSS_INDEX_TOKEN: ${{ secrets.OSS_INDEX_TOKEN }}
        run: make cve-check

  # ---------------------------------------------------------------------
  # Tag-gated publish pipeline: pre-push hardening (gates 1-4) followed
  # by linux/amd64 push + cosign keyless signing.
  #   Gate 1: single-arch (amd64) build with load: true for scanning/smoke
  #   Gate 2: Trivy CRITICAL/HIGH blocking (vuln/secret/misconfig)
  #   Gate 3: Spring Boot boot-marker smoke test (no external deps)
  #   Gate 4: container-structure-test (USER, ENTRYPOINT, layout)
  # On non-tag runs the docker job builds amd64 (the full pipeline) but
  # skips publish/sign — release-day regressions are caught on every push,
  # not only on tags.
  # NOTE: linux/arm64 is temporarily disabled to speed up the docker job
  # (arm64 cross-compiles under QEMU emulation, the multi-minute long pole).
  # Re-enable by adding `,linux/arm64` back to the `Build and push` step's
  # `platforms:` line below (the Gate-1 scan build stays amd64-only — `load:
  # true` cannot load a multi-arch manifest); the QEMU setup step is retained
  # so that stays a one-line change.
  # ---------------------------------------------------------------------
  docker:
    needs: [changes, build, test, integration-test]
    if: |
      !failure() && !cancelled() &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write       # GHCR push
      id-token: write       # cosign keyless OIDC signing (Sigstore Fulcio)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          # Repo-namespace GHCR path (ghcr.io/<owner>/<repo>/<pkg>) — the
          # user-namespace form ghcr.io/<owner>/<pkg> cannot be created by
          # GITHUB_TOKEN on user accounts (write_package denied).
          images: ghcr.io/${{ github.repository }}/app
          # Bare semver on Docker tags, `v`-prefix on git tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/v') }}

      # GATE 1: Build single-arch image locally for security checks.
      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: spring-boot-demo:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GATE 2: Trivy image scan — CRITICAL/HIGH blocks the release.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: spring-boot-demo:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # GATE 3: Spring Boot boot-marker smoke test.
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=smoke spring-boot-demo:scan
          echo "Waiting up to 90s for Spring Boot to boot..."
          end=$((SECONDS + 90))
          while [ $SECONDS -lt $end ]; do
            if docker logs smoke 2>&1 | grep -qE 'Started [A-Za-z]+ in [0-9]+\.[0-9]+ seconds|Tomcat started on port|Netty started on port'; then
              echo "PASS: Spring Boot booted"
              docker rm -f smoke >/dev/null
              exit 0
            fi
            sleep 3
          done
          echo "FAIL: Spring Boot did not reach start within 90s"
          echo "--- container logs ---"
          docker logs smoke
          docker rm -f smoke >/dev/null || true
          exit 1

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke 2>/dev/null || true

      # GATE 4: container-structure-test — validates USER, ENTRYPOINT,
      # WORKDIR, exposed ports, layered-jar layout. Catches Dockerfile
      # drift that compiles but breaks runtime contracts. mise here
      # provides the container-structure-test binary.
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Container structure test
        run: |
          docker tag spring-boot-demo:scan spring-boot-demo:0.0.1
          container-structure-test test \
            --image spring-boot-demo:0.0.1 \
            --config container-structure-test.yaml

      # All gates passed → publish amd64 on tag pushes only.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Post-push: cosign keyless signing.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          echo "Signing manifest digest ${DIGEST} for tags:"
          echo "${TAGS}"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  # Branch-protection aggregator. Single required status check — jobs can
  # be added or renamed without touching Settings. Skipped jobs (cve-check
  # on non-tag pushes, all heavy jobs on doc-only diffs) do NOT count as
  # failure — only `failure` results trip the gate.
  ci-pass:
    if: always()
    needs: [changes, static-check, test, integration-test, build, e2e, cve-check, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped."
