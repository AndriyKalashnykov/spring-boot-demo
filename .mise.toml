[tools]
# Pin to the latest Temurin 25 LTS patch that mise's aqua backend has
# indexed. Renovate's `java-version` datasource reads Adoptium directly
# and publishes new patches the same day; mise's index catches up in a
# few days — so newer Renovate PRs (e.g. 25.0.3+9) may fail `mise install`
# until aqua re-scrapes. Revert to the latest known-good patch when that
# happens.
#
# NOTE: no `# renovate:` annotations on these bare keys — Renovate's native
# `mise` manager extracts java/maven directly. A custom.regex over .mise.toml
# (removed 2026-06-05) double-tracked them under different packageNames and
# produced duplicate PRs; the 7-day java buffer + Maven grouping now key off
# the native mise depNames (`java-jdk`, `apache/maven`) in renovate.json.
java = "temurin-25.0.3+9.0.LTS"
maven = "3.9.16"

# Static-check + CI tooling installed via mise's aqua backend so a single
# `mise install` (or `make deps-install`) provides every CLI the Makefile
# composite gates need. CI inherits the same versions through `jdx/mise-action`.
#
# No `# renovate:` annotations on the aqua entries below: Renovate's
# built-in `mise` manager extracts these natively as `aqua:owner/repo`.
# Adding an annotation creates a duplicate PR per tool because the
# custom-regex manager would also match on the comment's bare `owner/repo`.
"aqua:hadolint/hadolint" = "2.14.0"
"aqua:nektos/act" = "0.2.89"
"aqua:aquasecurity/trivy" = "0.72.0"
"aqua:gitleaks/gitleaks" = "8.30.1"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:GoogleContainerTools/container-structure-test" = "1.22.1"

# Tools NOT in mise:
#   - google-java-format: ships as a JAR (not a binary) — aqua/ubi backends
#     target static binaries. Curl-downloaded into ~/.cache and invoked
#     via the GJF_VERSION constant in the Makefile (Renovate-tracked).
#   - mermaid-cli: run as a Docker image (minlag/mermaid-cli) — not a
#     local CLI.
#   - Maven (deps-maven): intentional curl-from-archive fallback for CI
#     containers that lack mise. The mise-managed Maven above is the
#     primary path.
