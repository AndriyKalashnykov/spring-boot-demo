name: Cleanup

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

permissions:
  actions: write

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cleanup-runs:
    name: Delete old workflow runs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          CUTOFF_DATE=$(date -u -d "${RETAIN_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)
          export CUTOFF_DATE
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt --limit 200 \
            --jq 'sort_by(.createdAt) | reverse | .[(env.KEEP_MINIMUM | tonumber):] | .[] | select(.createdAt < env.CUTOFF_DATE) | .databaseId' \
          | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"

  cleanup-caches:
    name: Delete old workflow caches
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete old caches
        run: |
          gh api "/repos/${{ github.repository }}/actions/caches" \
            --paginate --jq '.actions_caches[].id' \
          | xargs -r -I{} gh api -X DELETE "/repos/${{ github.repository }}/actions/caches/{}"
