name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: make test

  integration-test:
    name: Integration test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: make integration-test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: make build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spring-boot-demo-jar
          path: target/*.jar
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, integration-test, build]
    # Tag-gated: only publish on v* tag pushes or manual dispatch. Main-branch
    # pushes run through test / build / integration-test but stop short of
    # the registry push.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC (Sigstore Fulcio)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          # Repo-namespace GHCR path (ghcr.io/<owner>/<repo>/<pkg>) — the
          # user-namespace form ghcr.io/<owner>/<pkg> cannot be created by
          # GITHUB_TOKEN on user accounts (write_package denied). See
          # /harden-image-pipeline "GHCR namespace rule".
          images: ghcr.io/${{ github.repository }}/app
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          flavor: |
            latest=auto

      # =================================================================
      # Gate 1: single-arch local build for scanning + smoke testing
      # =================================================================
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: spring-boot-demo:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =================================================================
      # Gate 2: Trivy image scan — block on CRITICAL/HIGH fixed CVEs
      # =================================================================
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: spring-boot-demo:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # =================================================================
      # Gate 3: Spring Boot boot-marker smoke test
      # =================================================================
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=smoke spring-boot-demo:scan
          echo "Waiting up to 90s for Spring Boot to boot..."
          end=$((SECONDS + 90))
          while [ $SECONDS -lt $end ]; do
            if docker logs smoke 2>&1 | grep -qE 'Started [A-Z][a-zA-Z]+Application in|Tomcat started on port'; then
              echo "PASS: Spring Boot booted"
              exit 0
            fi
            sleep 3
          done
          echo "FAIL: Spring Boot did not reach start within 90s"
          docker logs smoke
          exit 1

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke 2>/dev/null || true

      # =================================================================
      # All gates passed — multi-arch push + cosign keyless signing
      # =================================================================
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false   # keep image index free of unknown/unknown entries (GHCR OS/Arch tab parity)
          sbom: false         # cosign keyless signing below provides supply-chain verification
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    name: CI pass
    runs-on: ubuntu-latest
    needs: [test, integration-test, build, docker]
    if: always()
    steps:
      - name: Aggregate job statuses
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test job failed: ${{ needs.test.result }}"
            exit 1
          fi
          if [ "${{ needs.integration-test.result }}" != "success" ]; then
            echo "integration-test job failed: ${{ needs.integration-test.result }}"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "build job failed: ${{ needs.build.result }}"
            exit 1
          fi
          if [ "${{ needs.docker.result }}" != "success" ] && [ "${{ needs.docker.result }}" != "skipped" ]; then
            echo "docker job failed: ${{ needs.docker.result }}"
            exit 1
          fi
          echo "All required jobs passed."
