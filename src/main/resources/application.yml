spring:
  jmx:
    enabled: false
  jpa:
    # Explicit configuration silences Spring Boot's default-enabled warning.
    # `true` keeps the existing behaviour (the entity manager stays open through
    # view rendering); for a high-throughput service this should be `false` to
    # avoid lazy-loading queries during response rendering.
    open-in-view: true

server:
  port: 8080
  http2:
    enabled: true
  servlet:
    context-path: "/"

management:
  metrics:
    enable:
      all: true
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  # No `server.port` — actuator endpoints share `server.port`. A separate
  # management port duplicated `server.port: 8080` and forced e2e tests
  # to pin both to the same kernel-allocated free port to avoid collision.
  endpoints:
    enabled-by-default: false
    web:
      base-path: "/actuator"
      exposure:
        include: "health,info,metrics,prometheus,loggers,env,configprops"
  endpoint:
    env:
      enabled: true
    configprops:
      enabled: true
    info:
      enabled: true
    health:
      enabled: true
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
    loggers:
      enabled: true
    sessions:
      enabled: true

springdoc:
  # Explicit configuration silences SpringDoc's default-enabled warnings.
  # The demo intentionally publishes /v3/api-docs and Swagger UI; in production
  # services these typically flip to `false` so the API surface isn't exposed.
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

info:
  build:
    artifact: "@project.artifactId@"
    description: "@project.description@"
    version: "@project.version@"

hotel:
  service:
    name: 'default profile'

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.test.example: DEBUG
  file:
    path: "."
    name: "application.log"
  pattern:
    console: "%clr(%d{YYYY-MM-dd E HH:mm:ss.SSS}){faint} %clr(%-5p) %clr(${PID}){faint} %clr([%8.15t]){faint} %clr(%c{1}:%L){cyan} %clr(:){red} %clr(%m){faint}%n"
    file: "%d{YYYY-MM-dd E HH:mm:ss.SSS} %-5p ${PID} [%8.15t] %c{1}:%L : %m%n"

---
spring:
  config:
    activate:
      on-profile: test
  h2:
    console:
      enabled: true
      path: /console
      settings:
        trace: false
        web-allow-others: false
